<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>食愈记 · 管理后台</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f1f4f9;
      color: #1f2937;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      cursor: pointer;
    }

    /* layout */
    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 230px;
      background: linear-gradient(180deg, #1e293b, #0f172a);
      color: #cbd5e1;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar .logo {
      padding: 22px 20px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .sidebar .nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .nav-group {
      margin: 4px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px;
      font-size: 14px;
      cursor: pointer;
      transition: all .15s;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, .06);
      color: #fff;
    }

    .nav-item.active {
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      color: #fff;
    }

    .nav-item .ico {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: .55;
    }

    .nav-sub {
      padding-left: 14px;
    }

    .nav-sub .nav-item {
      padding: 8px 22px 8px 36px;
      font-size: 13px;
      opacity: .85;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      height: 58px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .topbar .crumbs {
      font-size: 14px;
      color: #475569;
    }

    .topbar .user {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .topbar .user .role {
      background: #eef2ff;
      color: #4f46e5;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }

    .content {
      padding: 22px;
      flex: 1;
      overflow-y: auto;
    }

    .panel {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .06);
      margin-bottom: 18px;
    }

    .panel h3 {
      margin: 0 0 14px;
      font-size: 16px;
    }

    /* table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid #f1f5f9;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
      font-size: 12px;
    }

    tbody tr:hover {
      background: #fafbff;
    }

    /* form */
    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }

    input,
    select,
    textarea {
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #6366f1;
    }

    label {
      font-size: 13px;
      color: #475569;
    }

    /* button */
    .btn {
      padding: 6px 14px;
      border: 0;
      border-radius: 6px;
      background: #6366f1;
      color: #fff;
      font-size: 13px;
      transition: .15s;
    }

    .btn:hover {
      background: #4f46e5;
    }

    .btn.secondary {
      background: #e2e8f0;
      color: #1e293b;
    }

    .btn.secondary:hover {
      background: #cbd5e1;
    }

    .btn.danger {
      background: #ef4444;
    }

    .btn.danger:hover {
      background: #dc2626;
    }

    .btn.sm {
      padding: 3px 9px;
      font-size: 12px;
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* tag */
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      background: #e2e8f0;
      color: #334155;
      margin-right: 4px;
    }

    .tag.green {
      background: #dcfce7;
      color: #166534;
    }

    .tag.red {
      background: #fee2e2;
      color: #991b1b;
    }

    .tag.blue {
      background: #dbeafe;
      color: #1e40af;
    }

    /* dashboard cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .stat-card {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      padding: 18px;
      border-radius: 10px;
    }

    .stat-card .label {
      font-size: 13px;
      opacity: .85;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 4px;
    }

    .stat-card .sub {
      margin-top: 8px;
      font-size: 12px;
      opacity: .9;
    }

    .mini-chart-wrap {
      margin-bottom: 18px;
    }
    .mini-chart-wrap h4 {
      font-size: 13px;
      color: #64748b;
      margin: 12px 0 4px;
      font-weight: 500;
    }
    .mini-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 110px;
      padding: 10px 4px 0;
      border-bottom: 2px solid #e2e8f0;
      position: relative;
    }

    .mini-chart .bar {
      flex: 1;
      min-width: 4px;
      border-radius: 3px 3px 0 0;
      background: linear-gradient(180deg, #818cf8, #4f46e5);
      position: relative;
      cursor: pointer;
      transition: opacity .15s;
    }
    .mini-chart .bar:hover { opacity: .75; }

    .mini-chart .bar.food {
      background: linear-gradient(180deg, #34d399, #059669);
    }

    .mini-chart-labels {
      display: flex;
      gap: 3px;
      padding: 3px 4px 0;
      overflow: hidden;
    }
    .mini-chart-labels .lbl {
      flex: 1;
      font-size: 9px;
      color: #94a3b8;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }
    .mini-chart-labels .lbl.show {
      color: #64748b;
      font-size: 10px;
    }

    .warning-list {
      display: grid;
      gap: 10px;
    }

    .warning-item {
      padding: 10px 12px;
      border-radius: 8px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
    }

    .warning-item.danger {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    /* modal */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-mask.show {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 22px;
      min-width: 460px;
      max-width: 90vw;
      max-height: 86vh;
      overflow-y: auto;
    }

    .modal h4 {
      margin: 0 0 14px;
      font-size: 16px;
    }

    .modal .form-row {
      margin-bottom: 10px;
    }

    .modal .form-row label {
      width: 96px;
    }

    .modal .form-row input,
    .modal .form-row select,
    .modal .form-row textarea {
      flex: 1;
      min-width: 200px;
    }

    .modal .actions {
      text-align: right;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #f1f5f9;
    }

    /* tree-checkbox */
    .tree {
      font-size: 13px;
      max-height: 420px;
      overflow-y: auto;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 8px 12px;
    }

    .tree-node {
      padding: 3px 0;
    }

    .tree-node label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .tree-children {
      padding-left: 20px;
    }

    /* tree-select */
    .tree-select {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .tree-select-trigger {
      width: 100%;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #1f2937;
      font-size: 13px;
      text-align: left;
    }

    .tree-select-trigger:hover,
    .tree-select.open .tree-select-trigger {
      border-color: #6366f1;
    }

    .tree-select-dropdown {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      z-index: 120;
      max-height: 280px;
      overflow: auto;
      padding: 6px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(15, 23, 42, .14);
    }

    .tree-select.open .tree-select-dropdown {
      display: block;
    }

    .tree-select-row {
      display: flex;
      align-items: center;
      min-height: 28px;
      padding-left: calc(var(--depth, 0) * 18px);
    }

    .tree-select-expand {
      width: 22px;
      height: 24px;
      border: 0;
      background: transparent;
      color: #64748b;
      font-size: 11px;
      padding: 0;
    }

    .tree-select-expand.placeholder {
      visibility: hidden;
    }

    .tree-select-option {
      flex: 1;
      padding: 5px 8px;
      border-radius: 5px;
      color: #334155;
      cursor: pointer;
    }

    .tree-select-option:hover {
      background: #eef2ff;
      color: #4f46e5;
    }

    .tree-select-option.selected {
      background: #e0e7ff;
      color: #3730a3;
      font-weight: 600;
    }

    .tree-select-option.disabled {
      color: #94a3b8;
      cursor: not-allowed;
      background: transparent;
    }

    .tree-select-branch.collapsed {
      display: none;
    }

    .empty {
      padding: 40px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }

    .pager {
      margin-top: 12px;
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
      font-size: 13px;
    }

    .pager button {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
    }

    .pager button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .hidden {
      display: none !important;
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #1e293b;
      color: #fff;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      transition: .25s;
    }

    .toast.show {
      opacity: 1;
    }

    .toast.error {
      background: #dc2626;
    }

    .toast.success {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">食愈记 · 后台</div>
      <nav class="nav" id="nav"></nav>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="crumbs" id="crumbs">仪表盘</div>
        <div class="user">
          <span id="userName">-</span>
          <span class="role" id="userRoles">-</span>
          <button class="btn sm secondary" onclick="logout()">退出</button>
        </div>
      </div>
      <div class="content" id="content">
        <div class="empty">加载中...</div>
      </div>
    </main>
  </div>

  <div class="modal-mask" id="modal">
    <div class="modal" id="modalBox"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const API = '/api';
    const TOKEN_KEY = 'sy_admin_token';
    let MENUS = [];
    let PERMS = [];
    let ROLES = [];
    let CURRENT_USER = null;
    let CURRENT_PATH = '/dashboard';

    /* ===================== 工具 ===================== */
    function getToken() { return localStorage.getItem(TOKEN_KEY); }
    function authHeaders() { return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' }; }
    function hasPerm(...codes) {
      if (PERMS.includes('*')) return true;
      return codes.some(c => PERMS.includes(c));
    }
    function toast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast show ' + type;
      setTimeout(() => t.className = 'toast ' + type, 2000);
    }
    async function api(path, options = {}) {
      const res = await fetch(API + path, { ...options, headers: { ...authHeaders(), ...(options.headers || {}) } });
      if (res.status === 401) { localStorage.removeItem(TOKEN_KEY); location.href = '/index.html'; return; }
      const text = await res.text();
      let data; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
      if (!res.ok) {
        const msg = (data && data.message) || ('请求失败 ' + res.status);
        toast(msg, 'error');
        throw new Error(msg);
      }
      return data;
    }
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function fmtTime(t) { if (!t) return '-'; return new Date(t).toLocaleString('zh-CN', { hour12: false }); }
    function prettyJson(value) { return JSON.stringify(value ?? {}, null, 2); }
    function ratioText(value) { const n = Number(value || 0); return `${n >= 0 ? '+' : ''}${n}%`; }
    function layerTag(layer, label) {
      const cls = layer === 'high_value' ? 'blue' : layer === 'active' ? 'green' : layer === 'lost' ? 'red' : '';
      return `<span class="tag ${cls}">${escapeHtml(label || layer || '-')}</span>`;
    }
    function auditTag(status) {
      const map = { pending: ['待审核', 'blue'], approved: ['已通过', 'green'], rejected: ['已驳回', 'red'] };
      const item = map[status] || [status || 'approved', 'green'];
      return `<span class="tag ${item[1]}">${item[0]}</span>`;
    }

    /* ===================== 模态框 ===================== */
    function showModal(html) {
      document.getElementById('modalBox').innerHTML = html;
      document.getElementById('modal').classList.add('show');
    }
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    /* ===================== 启动 ===================== */
    async function boot() {
      if (!getToken()) { location.href = '/index.html'; return; }
      try {
        const me = await api('/auth/me');
        CURRENT_USER = me.user;
        MENUS = me.menus || [];
        PERMS = me.perms || [];
        ROLES = me.roles || [];
        document.getElementById('userName').textContent = (me.user && (me.user.nickname || me.user.username)) || '-';
        document.getElementById('userRoles').textContent = ROLES.join(' · ') || 'guest';
        renderNav();
        // 默认打开第一个可见菜单
        const first = findFirstMenu(MENUS);
        if (first) navigate(first.path || '/dashboard', first.menu_name); else navigate('/dashboard', '仪表盘');
      } catch (e) { console.error(e); }
    }
    function findFirstMenu(list) {
      for (const m of list) {
        if (m.type === 'menu' && m.path) return m;
        if (m.children && m.children.length) {
          const sub = findFirstMenu(m.children);
          if (sub) return sub;
        }
      }
      return null;
    }

    /* ===================== 左侧菜单渲染 ===================== */
    function renderNav() {
      const root = document.getElementById('nav');
      root.innerHTML = MENUS.filter(m => m.type !== 'button').map(renderNavNode).join('');
    }
    function renderNavNode(m) {
      const subs = (m.children || []).filter(c => c.type !== 'button');
      if (subs.length) {
        return `<div class="nav-group">
      <div class="nav-item" onclick="this.nextElementSibling.classList.toggle('hidden')">
        <span class="ico"></span>${escapeHtml(m.menu_name)}
      </div>
      <div class="nav-sub">${subs.map(renderNavNode).join('')}</div>
    </div>`;
      }
      return `<div class="nav-item" data-path="${m.path || ''}" onclick="navigate('${m.path || ''}','${escapeHtml(m.menu_name)}')">
    <span class="ico"></span>${escapeHtml(m.menu_name)}
  </div>`;
    }

    function navigate(path, label) {
      if (!path) return;
      CURRENT_PATH = path;
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.path === path);
      });
      document.getElementById('crumbs').textContent = label || path;
      const view = ROUTES[path];
      if (view) view(); else document.getElementById('content').innerHTML = `<div class="panel"><div class="empty">页面 ${escapeHtml(path)} 未实现</div></div>`;
    }

    function logout() {
      api('/auth/logout', { method: 'POST' }).finally(() => {
        localStorage.removeItem(TOKEN_KEY);
        location.href = '/index.html';
      });
    }

    /* ===================== 路由表 ===================== */
    const ROUTES = {
      '/dashboard': viewDashboard,
      '/user': viewUserList,
      '/user/list': viewUserList,
      '/food': viewFoodList,
      '/food/list': viewFoodList,
      '/food/statistic': viewFoodStat,
      '/user/analysis': viewUserAnalysis,
      '/permission': viewDept,
      '/permission/dept': viewDept,
      '/permission/role': viewRole,
      '/permission/menu': viewMenu,
      '/permission/sysUser': viewSysUser,
      '/permission/log': viewLog,
      '/system': viewFoodCategory,
      '/system/foodCategory': viewFoodCategory,
      '/system/param': viewParam,
      '/system/backup': viewBackup,
    };

    /* ===================== 仪表盘 ===================== */
    async function viewDashboard() {
      const c = document.getElementById('content');
      c.innerHTML = `<div class="panel"><div id="dashStats" class="stat-grid"><div class="empty">加载中...</div></div></div>
    <div class="panel"><h3>运营预警</h3><div id="dashWarnings"><div class="empty">加载中...</div></div></div>
    <div class="panel"><h3>近 30 天增长趋势</h3><div id="dashTrend"><div class="empty">加载中...</div></div></div>
    <div class="panel"><h3>更新记录</h3><div id="dashUpdates"></div></div>`;
      try {
        const [stats, ops] = await Promise.all([api('/dashboard/stats'), api('/dashboard/operations')]);
        const cards = [
          { label: '总用户数', value: stats.totalUsers ?? '-' },
          { label: '今日新增用户', value: stats.todayNewUsers ?? '-', sub: `环比 ${ratioText(ops.metrics?.todayUsers?.dayRatio)} · 近7日 ${ratioText(ops.metrics?.todayUsers?.weekRatio)}` },
          { label: '食物总数', value: stats.totalFoods ?? '-' },
          { label: '今日新增食物', value: stats.todayNewFoods ?? '-', sub: `环比 ${ratioText(ops.metrics?.todayFoods?.dayRatio)} · 近7日 ${ratioText(ops.metrics?.todayFoods?.weekRatio)}` },
          { label: '今日饮食记录', value: stats.todayDietRecords ?? '-' },
          { label: '活跃用户', value: stats.activeUsers ?? '-' },
          { label: '30天流失率', value: `${ops.metrics?.inactiveRate?.value ?? 0}%`, sub: `流失 ${ops.metrics?.inactiveRate?.inactiveUsers ?? 0} / ${ops.metrics?.inactiveRate?.totalUsers ?? 0}` },
        ];
        document.getElementById('dashStats').innerHTML = cards.map(x => `
      <div class="stat-card"><div class="label">${x.label}</div><div class="value">${x.value}</div>${x.sub ? `<div class="sub">${escapeHtml(x.sub)}</div>` : ''}</div>
    `).join('');
        document.getElementById('dashWarnings').innerHTML = (ops.warnings || []).length
          ? `<div class="warning-list">${ops.warnings.map(w => `<div class="warning-item ${w.level === 'danger' ? 'danger' : ''}"><strong>${escapeHtml(w.title)}</strong><br>${escapeHtml(w.message)}</div>`).join('')}</div>`
          : '<div class="empty">暂无异常预警</div>';
      } catch { }
      try {
        const trend = await api('/dashboard/trends');
        const maxUsers = Math.max(1, ...trend.data.map(x => Number(x.new_users || 0)));
        const maxFoods = Math.max(1, ...trend.data.map(x => Number(x.new_foods || 0)));
        const mkLabels = (arr) => arr.map((x, i) => `<div class="lbl ${i % 5 === 0 ? 'show' : ''}">${i % 5 === 0 ? escapeHtml((x.bucket||'').slice(5)||x.bucket||'') : ''}</div>`).join('');
        document.getElementById('dashTrend').innerHTML = `<div class="form-row" style="margin-bottom:4px"><span class="tag blue">用户新增</span><span class="tag green">食物新增</span></div>
          <div class="mini-chart-wrap">
            <h4>用户新增</h4>
            <div class="mini-chart">${trend.data.map(x => `<div class="bar" title="${escapeHtml(x.bucket)}：${x.new_users}" style="height:${Math.max(3, Number(x.new_users || 0) / maxUsers * 110)}px"></div>`).join('')}</div>
            <div class="mini-chart-labels">${mkLabels(trend.data)}</div>
          </div>
          <div class="mini-chart-wrap">

    async function assignMenu(roleId, roleName) {
      const [allMenus, bound] = await Promise.all([api('/sys/menus'), api(`/sys/roles/${roleId}/menus`)]);
      const boundSet = new Set(bound);
      const tree = buildMenuTreeForUI(allMenus);
      const renderTree = (nodes) => nodes.map(n => `
    <div class="tree-node">
      <label><input type="checkbox" data-mid="${n.id}" ${boundSet.has(Number(n.id)) ? 'checked' : ''} />
        ${escapeHtml(n.menu_name)} <span class="tag">${n.type}</span>${n.permission ? `<span class="tag blue">${escapeHtml(n.permission)}</span>` : ''}</label>
      ${n.children && n.children.length ? `<div class="tree-children">${renderTree(n.children)}</div>` : ''}
    </div>`).join('');
      showModal(`<h4>分配菜单：${escapeHtml(roleName)}</h4>
    <div class="tree" id="menuTree">${renderTree(tree)}</div>
    <div class="actions">
      <button class="btn secondary" onclick="closeModal()">取消</button>
      <button class="btn" onclick="saveAssignMenu(${roleId})">保存</button>
    </div>`);
    }
    function buildMenuTreeForUI(rows) {
      const map = new Map();
      rows.forEach(r => map.set(Number(r.id), { ...r, id: Number(r.id), parent_id: Number(r.parent_id), children: [] }));
      const roots = [];
      map.forEach(n => { if (n.parent_id && map.has(n.parent_id)) map.get(n.parent_id).children.push(n); else roots.push(n); });
      return roots;
    }

    function escapeJs(s) {
      return String(s ?? '').replace(/[\\'"\n\r]/g, c => ({ '\\': '\\\\', "'": "\\'", '"': '\\"', '\n': '\\n', '\r': '\\r' }[c]));
    }

    function findTreeNode(nodes, id) {
      const target = Number(id || 0);
      if (!target) return null;
      for (const node of nodes || []) {
        if (Number(node.id) === target) return node;
        const child = findTreeNode(node.children || [], target);
        if (child) return child;
      }
      return null;
    }

    function collectSubtreeIds(nodes, id, acc = new Set()) {
      const node = findTreeNode(nodes, id);
      if (!node) return acc;
      const walk = (n) => {
        acc.add(Number(n.id));
        (n.children || []).forEach(walk);
      };
      walk(node);
      return acc;
    }

    function renderTreeSelect(wrapperId, inputId, tree, value, rootLabel, placeholder, disabledRootId = 0) {
      const selectedId = Number(value || 0);
      const selectedNode = findTreeNode(tree, selectedId);
      const selectedLabel = selectedId ? (selectedNode?.label || `ID ${selectedId}`) : rootLabel;
      const disabledIds = disabledRootId ? collectSubtreeIds(tree, disabledRootId) : new Set();
      const renderNodes = (nodes, depth = 0) => (nodes || []).map((node) => {
        const children = node.children || [];
        const isSelected = selectedId === Number(node.id);
        const isDisabled = disabledIds.has(Number(node.id));
        const optionClass = `tree-select-option${isSelected ? ' selected' : ''}${isDisabled ? ' disabled' : ''}`;
        return `<div class="tree-select-row" style="--depth:${depth}">
          <button type="button" class="tree-select-expand${children.length ? '' : ' placeholder'}" onclick="toggleTreeBranch(event,this)">▾</button>
          <div class="${optionClass}" ${isDisabled ? '' : `onclick="selectTreeValue(event,'${wrapperId}','${inputId}',${Number(node.id)},'${escapeJs(node.label)}')"`}>
            ${escapeHtml(node.label)}${node.type ? ` <span class="tag">${escapeHtml(node.type)}</span>` : ''}
          </div>
        </div>${children.length ? `<div class="tree-select-branch">${renderNodes(children, depth + 1)}</div>` : ''}`;
      }).join('');
      return `<div class="tree-select" id="${wrapperId}">
        <input type="hidden" id="${inputId}" value="${selectedId}" />
        <button type="button" class="tree-select-trigger" onclick="toggleTreeSelect('${wrapperId}')"><span id="${inputId}_text">${escapeHtml(selectedLabel || placeholder)}</span><span>▾</span></button>
        <div class="tree-select-dropdown">
          <div class="tree-select-row" style="--depth:0"><span class="tree-select-expand placeholder">▾</span><div class="tree-select-option${selectedId === 0 ? ' selected' : ''}" onclick="selectTreeValue(event,'${wrapperId}','${inputId}',0,'${escapeJs(rootLabel)}')">${escapeHtml(rootLabel)}</div></div>
          ${renderNodes(tree)}
        </div>
      </div>`;
    }

    function toggleTreeSelect(wrapperId) {
      const target = document.getElementById(wrapperId);
      document.querySelectorAll('.tree-select.open').forEach(el => {
        if (el !== target) el.classList.remove('open');
      });
      target?.classList.toggle('open');
    }

    function toggleTreeBranch(evt, btn) {
      evt.stopPropagation();
      const branch = btn.parentElement?.nextElementSibling;
      if (!branch || !branch.classList.contains('tree-select-branch')) return;
      branch.classList.toggle('collapsed');
      btn.textContent = branch.classList.contains('collapsed') ? '▸' : '▾';
    }

    function selectTreeValue(evt, wrapperId, inputId, value, label) {
      document.getElementById(inputId).value = String(value || 0);
      document.getElementById(`${inputId}_text`).textContent = label;
      const wrapper = document.getElementById(wrapperId);
      wrapper?.classList.remove('open');
      wrapper?.querySelectorAll('.tree-select-option').forEach(el => el.classList.remove('selected'));
      evt.target.classList.add('selected');
    }

      const password = document.getElementById('su_password')?.value;
      const nickname = document.getElementById('su_nickname')?.value.trim();
      const phone = document.getElementById('su_phone')?.value.trim();
      const email = document.getElementById('su_email')?.value.trim();
      const dept_id = document.getElementById('su_dept')?.value || null;
      const status = document.getElementById('su_status')?.value;
      const roleIds = [...document.querySelectorAll('input[name="su_role"]:checked')].map(el => Number(el.value));
      if (!username) return toast('用户名必填', 'error');
      if (!id && !password) return toast('密码必填', 'error');
      const body = { username, nickname, phone, email, dept_id: dept_id ? Number(dept_id) : null, status, roleIds };
      if (password) body.password = password;
      if (id) await api('/sys/users/' + id, { method: 'PUT', body: JSON.stringify(body) });
      else await api('/sys/users', { method: 'POST', body: JSON.stringify(body) });
      toast('已保存', 'success'); closeModal(); loadSysUsers();
    }
    async function resetSysUserPwd(id, username) {
      showModal(`<h4>重置密码 - ${escapeHtml(username)}</h4>
      <div class="form-row"><label>新密码</label><input id="newPwd" type="password" placeholder="请输入新密码（≥6位）" /></div>
      <div class="actions">
        <button class="btn secondary" onclick="closeModal()">取消</button>
        <button class="btn" onclick="doResetPwd(${id})">确认重置</button>
      </div>`);
    }
    async function doResetPwd(id) {
      const pwd = document.getElementById('newPwd')?.value;
      if (!pwd || pwd.length < 6) return toast('密码至少6位', 'error');
      await api('/sys/users/' + id + '/password', { method: 'PATCH', body: JSON.stringify({ password: pwd }) });
      toast('密码已重置', 'success'); closeModal();
    }
    async function delSysUser(id, username) {
      if (!confirm(`确定删除账号「${username}」？`)) return;
      await api('/sys/users/' + id, { method: 'DELETE' });
      toast('已删除', 'success'); loadSysUsers();
    }

    /* ===================== 菜单管理 ===================== */
    async function viewMenu() {
      document.getElementById('content').innerHTML = `<div class="panel">
    <h3>菜单管理</h3>
    <div class="form-row">${hasPerm('menu:list') ? '<button class="btn" onclick="editMenu()">新增菜单</button>' : ''}</div>
    <div id="menuMgrTable"></div></div>`;
      loadMenus();
    }
    async function loadMenus() {
      const list = await api('/sys/menus');
      const tree = buildMenuTreeForUI(list);
      const flat = [];
      const walk = (arr, depth) => arr.forEach(n => { flat.push({ ...n, _depth: depth }); if (n.children) walk(n.children, depth + 1); });
      walk(tree, 0);
      document.getElementById('menuMgrTable').innerHTML = `<table><thead>
    <tr><th>名称</th><th>类型</th><th>路径</th><th>权限码</th><th>排序</th><th>操作</th></tr></thead>
    <tbody>${flat.map(m => `<tr>
      <td>${'　'.repeat(m._depth)}${escapeHtml(m.menu_name)}</td>
      <td><span class="tag">${m.type}</span></td>
      <td>${escapeHtml(m.path || '')}</td>
      <td><span class="tag blue">${escapeHtml(m.permission || '')}</span></td>
      <td>${m.sort || 0}</td>
      <td>
        ${hasPerm('menu:list') ? `<button class="btn sm secondary" onclick='editMenu(${JSON.stringify({ ...m, children: undefined, _depth: undefined })})'>编辑</button>` : ''}
        ${hasPerm('menu:list') ? `<button class="btn sm danger" onclick="delMenu(${m.id})">删除</button>` : ''}
      </td></tr>`).join('')}</tbody></table>`;
    }
    async function editMenu(m) {
      m = m || {};
      const menuTree = await api('/sys/menus/tree');
      showModal(`<h4>${m.id ? '编辑' : '新增'}菜单</h4>
    <div class="form-row"><label>上级菜单</label>${renderTreeSelect('menuParentSelect', 'm_parent', menuTree, m.parent_id || 0, '顶级菜单', '请选择上级菜单', m.id || 0)}</div>
    <div class="form-row"><label>名称</label><input id="m_name" value="${escapeHtml(m.menu_name || '')}" /></div>
    <div class="form-row"><label>类型</label><select id="m_type">
      <option value="menu" ${m.type === 'menu' ? 'selected' : ''}>菜单</option>
      <option value="dir" ${m.type === 'dir' ? 'selected' : ''}>目录</option>
      <option value="button" ${m.type === 'button' ? 'selected' : ''}>按钮</option></select></div>
    <div class="form-row"><label>路径</label><input id="m_path" value="${escapeHtml(m.path || '')}" /></div>
    <div class="form-row"><label>图标</label><input id="m_icon" value="${escapeHtml(m.icon || '')}" /></div>
    <div class="form-row"><label>权限码</label><input id="m_perm" value="${escapeHtml(m.permission || '')}" /></div>
    <div class="form-row"><label>排序</label><input id="m_sort" type="number" value="${m.sort || 0}" /></div>
    <div class="form-row"><label>状态</label><select id="m_status">
      <option value="enable" ${m.status !== 'disable' ? 'selected' : ''}>启用</option>
      <option value="disable" ${m.status === 'disable' ? 'selected' : ''}>禁用</option></select></div>
    <div class="actions"><button class="btn secondary" onclick="closeModal()">取消</button>
    <button class="btn" onclick="saveMenu(${m.id || 0})">保存</button></div>`);
    }
    async function saveMenu(id) {
      const body = {
        parent_id: Number(document.getElementById('m_parent').value) || 0,
        menu_name: document.getElementById('m_name').value.trim(),
        type: document.getElementById('m_type').value,
        path: document.getElementById('m_path').value || null,
        icon: document.getElementById('m_icon').value || null,
        permission: document.getElementById('m_perm').value || null,
        sort: Number(document.getElementById('m_sort').value) || 0,
        status: document.getElementById('m_status').value,
      };
      if (!body.menu_name) return toast('名称必填', 'error');
      if (id) await api('/sys/menus/' + id, { method: 'PUT', body: JSON.stringify(body) });
      else await api('/sys/menus', { method: 'POST', body: JSON.stringify(body) });
      toast('已保存', 'success'); closeModal(); loadMenus();
    }
    async function delMenu(id) {
      if (!confirm('确定删除？')) return;
      await api('/sys/menus/' + id, { method: 'DELETE' });
      toast('已删除', 'success'); loadMenus();
    }

    /* ===================== 操作日志 ===================== */
    async function viewLog() {
      document.getElementById('content').innerHTML = `<div class="panel">
    <h3>操作日志</h3>
    <div class="form-row">
      <input id="lUser" placeholder="用户名" />
      <input id="lModule" placeholder="模块" />
      <input id="lStart" type="date" />
      <input id="lEnd" type="date" />
      <button class="btn" onclick="loadLogs(1)">查询</button>
    </div>
    <div id="logTable"></div><div class="pager" id="logPager"></div></div>`;
      loadLogs(1);
    }
    let _logPage = 1;
    async function loadLogs(page) {
      if (page) _logPage = page;
      const qs = new URLSearchParams({ page: _logPage, pageSize: 20 });
      ['lUser', 'lModule', 'lStart', 'lEnd'].forEach(id => {
        const v = document.getElementById(id).value.trim();
        if (v) qs.set({ lUser: 'username', lModule: 'module', lStart: 'startDate', lEnd: 'endDate' }[id], v);
      });
      const data = await api('/sys/logs?' + qs);
      document.getElementById('logTable').innerHTML = `<table><thead>
    <tr><th>ID</th><th>用户</th><th>模块</th><th>操作内容</th><th>IP</th><th>时间</th><th>详情</th></tr></thead>
    <tbody>${(data.data || []).map(l => `<tr>
      <td>${l.id}</td><td>${escapeHtml(l.username || '-')}</td>
      <td><span class="tag">${escapeHtml(l.module || '')}</span></td>
      <td>${escapeHtml(l.content || '')}</td><td>${escapeHtml(l.ip || '-')}</td>
      <td>${fmtTime(l.created_at)}</td>
      <td>${l.has_details ? `<button class="btn sm secondary" onclick="showLogDetail(${l.id})">查看</button>` : '<span class="tag">无</span>'}</td></tr>`).join('') || '<tr><td colspan="7" class="empty">暂无</td></tr>'}</tbody></table>`;
      document.getElementById('logPager').innerHTML = pagerHtml(data, 'loadLogs');
    }

    async function showLogDetail(id) {
      const log = await api('/sys/logs/' + id);
      showModal(`<h4>操作日志详情 #${log.id}</h4>
    <div class="form-row"><label>用户</label><input value="${escapeHtml(log.username || '-')}" disabled /></div>
    <div class="form-row"><label>模块</label><input value="${escapeHtml(log.module || '-')}" disabled /></div>
    <div class="form-row"><label>操作</label><input value="${escapeHtml(log.content || '-')}" disabled /></div>
    <div class="form-row"><label>IP</label><input value="${escapeHtml(log.ip || '-')}" disabled /></div>
    <div class="form-row"><label>时间</label><input value="${escapeHtml(fmtTime(log.created_at))}" disabled /></div>
    <div class="form-row"><label>详情</label><textarea style="min-height:260px;font-family:Consolas,monospace" readonly>${escapeHtml(prettyJson(log.details))}</textarea></div>
    <div class="actions"><button class="btn secondary" onclick="closeModal()">关闭</button></div>`);
    }

    /* ===================== 数据备份恢复 ===================== */
    function backupSummaryHtml(summary, valueLabel = '记录数') {
      const rows = Object.entries(summary || {});
      if (!rows.length) return '<div class="empty">暂无执行记录</div>';
      return `<table><thead><tr><th>表名</th><th>${valueLabel}</th></tr></thead><tbody>${rows.map(([table, count]) => `
    <tr><td>${escapeHtml(table)}</td><td>${count}</td></tr>
  `).join('')}</tbody></table>`;
    }

    function renderBackupResult(title, summary, valueLabel = '记录数') {
      document.getElementById('backupResult').innerHTML = `<h3>${escapeHtml(title)}</h3>${backupSummaryHtml(summary, valueLabel)}`;
    }

    async function loadBackupSummary() {
      const box = document.getElementById('backupCurrentSummary');
      if (!box) return;
      box.innerHTML = '<div class="empty">加载中...</div>';
      try {
        const summary = await api('/sys/backup/summary');
        box.innerHTML = `
          <div class="form-row">
            <span class="tag blue">表数：${summary.tableCount ?? 0}</span>
            <span class="tag green">总记录数：${summary.totalRecords ?? 0}</span>
            <span class="tag">生成时间：${fmtTime(summary.generatedAt)}</span>
          </div>
          ${backupSummaryHtml((summary && summary.counts) || {})}
        `;
      } catch {
        box.innerHTML = '<div class="empty">当前数据摘要加载失败</div>';
      }
    }

    async function loadBackupSchedule() {
      const box = document.getElementById('backupScheduleBox');
      if (!box) return;
      box.innerHTML = '<div class="empty">加载中...</div>';
      try {
        const cfg = await api('/sys/backup/schedule');
        box.innerHTML = `<div class="form-row">
          <label>启用定时</label>
          <select id="backupScheduleEnabled"><option value="true" ${cfg.enabled ? 'selected' : ''}>启用</option><option value="false" ${!cfg.enabled ? 'selected' : ''}>停用</option></select>
          <label>频率</label>
          <select id="backupScheduleFrequency"><option value="daily" ${cfg.frequency === 'daily' ? 'selected' : ''}>每日</option><option value="weekly" ${cfg.frequency === 'weekly' ? 'selected' : ''}>每周</option></select>
          <label>时间</label><input id="backupScheduleTime" type="time" value="${escapeHtml(cfg.time || '02:00')}" />
        </div>
        <div class="form-row">
          <label>保存目录</label><input id="backupSchedulePath" style="min-width:320px" value="${escapeHtml(cfg.path || 'backups')}" />
          ${hasPerm('system:backup') ? '<button class="btn" onclick="saveBackupSchedule()">保存配置</button>' : ''}
          ${hasPerm('system:backup') ? '<button class="btn secondary" onclick="runScheduledBackupNow()">立即执行一次</button>' : ''}
        </div>
        <p>说明：定时配置保存到系统参数中；“立即执行一次”会按配置目录生成 JSON 备份文件。</p>`;
      } catch {
        box.innerHTML = '<div class="empty">定时备份配置加载失败</div>';
      }
    }

    async function saveBackupSchedule() {
      const body = {
        enabled: document.getElementById('backupScheduleEnabled').value === 'true',
        frequency: document.getElementById('backupScheduleFrequency').value,
        time: document.getElementById('backupScheduleTime').value || '02:00',
        path: document.getElementById('backupSchedulePath').value || 'backups',
      };
      await api('/sys/backup/schedule', { method: 'PUT', body: JSON.stringify(body) });
      toast('定时备份配置已保存', 'success');
      loadBackupSchedule();
    }

    async function runScheduledBackupNow() {
      if (!confirm('确认按当前定时备份配置立即生成一次备份文件？')) return;
      const result = await api('/sys/backup/schedule/run', { method: 'POST' });
      renderBackupResult(`计划备份已生成：${result.filename || ''}`, (result && result.counts) || {});
      toast('计划备份已生成', 'success');
    }

    async function downloadBackup() {
      const btn = document.getElementById('backupExportBtn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '导出中...';
      try {
        const res = await fetch(API + '/sys/backup/export', { headers: { 'Authorization': 'Bearer ' + getToken() } });
        if (res.status === 401) { localStorage.removeItem(TOKEN_KEY); location.href = '/index.html'; return; }

        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch { }

        if (!res.ok) {
          const msg = (data && data.message) || ('请求失败 ' + res.status);
          toast(msg, 'error');
          throw new Error(msg);
        }

        const disposition = res.headers.get('content-disposition') || '';
        const match = disposition.match(/filename="?([^";]+)"?/i);
        const filename = match ? match[1] : `shiyuji-backup-${Date.now()}.json`;
        const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);

        renderBackupResult('最近导出摘要', (data && data.counts) || {});
        toast('备份已下载', 'success');
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    async function restoreBackup() {
      const input = document.getElementById('backupFile');
      const file = input.files && input.files[0];
      if (!file) return toast('请先选择备份文件', 'error');
      if (!confirm('恢复会覆盖当前数据库数据，是否继续？')) return;

      const btn = document.getElementById('backupRestoreBtn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '恢复中...';
      try {
        const text = await file.text();
        const payload = JSON.parse(text);
        const result = await api('/sys/backup/restore', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        renderBackupResult('最近恢复摘要', (result && result.restored) || {}, '已恢复行数');
        toast('备份恢复完成', 'success');
        input.value = '';
      } catch (error) {
        if (error instanceof SyntaxError) {
          toast('备份文件不是有效的 JSON', 'error');
          return;
        }
        throw error;
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    function viewBackup() {
      document.getElementById('content').innerHTML = `<div class="panel">
    <h3>数据备份恢复</h3>
    <p>在线备份会导出当前业务表的 JSON 快照；在线恢复会覆盖现有数据，请谨慎操作。</p>
    <div class="form-row">
      ${hasPerm('system:backup') ? '<button class="btn" id="backupExportBtn" onclick="downloadBackup()">下载当前备份</button>' : ''}
      <button class="btn secondary" onclick="loadBackupSummary()">刷新当前摘要</button>
    </div>
    <div class="form-row">
      <input id="backupFile" type="file" accept="application/json,.json" />
      ${hasPerm('system:backup') ? '<button class="btn danger" id="backupRestoreBtn" onclick="restoreBackup()">恢复所选备份</button>' : ''}
    </div>
    <p>建议保留数据库级 <code>pg_dump</code> 备份作为最终兜底；在线恢复更适合当前项目的快速迁移与回滚。</p>
  </div>
  <div class="panel">
    <h3>定时备份配置</h3>
    <div id="backupScheduleBox"><div class="empty">加载中...</div></div>
  </div>
  <div class="panel">
    <h3>当前数据摘要</h3>
    <div id="backupCurrentSummary"><div class="empty">加载中...</div></div>
  </div>
  <div class="panel" id="backupResult">
    <h3>执行摘要</h3>
    <div class="empty">还没有执行在线备份或恢复</div>
  </div>`;
      loadBackupSummary();
      loadBackupSchedule();
    }

    boot();
  </script>
</body>
